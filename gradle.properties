# Shadey Gradle configuration
org.gradle.jvmargs=-Xmx2560m -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.configuration-cache=false

# Use the JDK already on the machine; never try to download a toolchain
# (the build environment may not have network access to Foojay/Adoptium).
org.gradle.java.installations.auto-download=false

# Kotlin
kotlin.code.style=official

# AndroidX (only relevant when the :app module is configured)
android.useAndroidX=true
android.nonTransitiveRClass=true
